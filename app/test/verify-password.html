<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>密码哈希验证</title>
</head>
<body>
  <h1>密码哈希验证测试</h1>
  <div id="output"></div>

  <script type="module">
    // 需要在浏览器中运行，使用 bcryptjs
    import { compare } from 'https://cdn.jsdelivr.net/npm/bcryptjs@2.4.3/+esm';

    const FRONTEND_HASH = '$2b$10$w2x2kLPai7bc.HLqX7EtqeSBVEWWr2crpObcDAuYHpD.6tiRLzkwi';
    const BACKEND_HASH = '$2b$10$EixZaYVK1fsbw1ZfbX3OXePaWxn96p36WQoeG6Lruj3vjPGga31lW';
    const TEST_PASSWORD = 'admin123';

    async function verifyHashes() {
      const output = document.getElementById('output');

      output.innerHTML = '<p>🔍 正在验证...</p>';

      const frontendValid = await compare(TEST_PASSWORD, FRONTEND_HASH);
      const backendValid = await compare(TEST_PASSWORD, BACKEND_HASH);

      output.innerHTML = `
        <h2>测试结果</h2>
        <p><strong>测试密码:</strong> ${TEST_PASSWORD}</p>
        <p><strong>前端哈希:</strong> ${FRONTEND_HASH}</p>
        <p><strong>后端哈希:</strong> ${BACKEND_HASH}</p>
        <hr>
        <p><strong>✅ 前端哈希验证:</strong> ${frontendValid ? '<span style="color: green">有效</span>' : '<span style="color: red">无效</span>'}</p>
        <p><strong>✅ 后端哈希验证:</strong> ${backendValid ? '<span style="color: green">有效</span>' : '<span style="color: red">无效</span>'}</p>
        <hr>
        <p><strong>📋 结论:</strong></p>
        ${frontendValid && backendValid
          ? '<p>✅ 两个哈希都有效！它们都对应密码 "admin123"，但使用了不同的盐值。这是正常的。</p>'
          : '<p>❌ 有哈希无效，需要重新生成。</p>'}
      `;
    }

    verifyHashes();
  </script>
</body>
</html>
