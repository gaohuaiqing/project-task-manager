<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>技术团队智能管理平台</title>

    <!-- 关键 CSS 内联，确保首屏立即渲染 -->
    <style>
      *{margin:0;padding:0;box-sizing:border-box}html{visibility:hidden}html.loaded{visibility:visible}#root{min-height:100vh;display:flex;flex-direction:column}.skeleton{background:linear-gradient(90deg,hsl(var(--muted)) 0%,hsl(var(--muted)/.5) 50%,hsl(var(--muted)) 100%);background-size:200% 100%;animation:skeleton-loading 1.5s ease-in-out infinite}@keyframes skeleton-loading{0%{background-position:200% 0}100%{background-position:-200% 0}}.loading-spinner{display:inline-block;width:40px;height:40px;border:4px solid hsl(var(--primary));border-right-color:transparent;border-radius:50%;animation:spin .8s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}.ellipsis{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.flex{display:flex}.flex-col{display:flex;flex-direction:column}.items-center{align-items:center}.justify-center{justify-content:center}.justify-between{justify-content:space-between}.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border-width:0}.header{height:4rem;border-bottom:1px solid hsl(var(--border))}.sidebar{width:16rem;border-right:1px solid hsl(var(--border))}.sidebar.collapsed{width:4rem}.main-content{flex:1;padding:1.5rem}@media (max-width:768px){.sidebar{position:fixed;left:-100%;z-index:50;transition:left .3s}.sidebar.open{left:0}}
    </style>

    <!-- 字体预连接优化 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- 字体预加载（使用 swap 策略避免阻塞渲染） -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- DNS 预解析 -->
    <link rel="dns-prefetch" href="//localhost:3001">

    <!-- 预连接到后端 API -->
    <link rel="preconnect" href="http://localhost:3001">

    <script>
      (function() {
        const theme = localStorage.getItem('theme') || 'light';
        const isDark = theme === 'dark' ||
          (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        if (isDark) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
